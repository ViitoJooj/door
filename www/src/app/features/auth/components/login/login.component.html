<div class="auth-layout">

  <div class="brand-side">
    <img class="brand-watermark" src="logo.png" alt="" aria-hidden="true" />
    <span class="brand-logo">ward.</span>
    <div class="brand-content">
      <p class="brand-tagline">
        Protection gateway<br>
        <span class="brand-tagline--muted">for your APIs.</span>
      </p>
    </div>
    <span class="brand-footer">self-hosted &amp; open source</span>
  </div>

  <div class="form-side">
    <div class="form-container">

      <div class="tabs">
        <button
          class="tab"
          [class.tab--active]="activeTab() === 'login'"
          (click)="setTab('login')"
          type="button"
        >
          Log In
        </button>
        <button
          class="tab"
          [class.tab--active]="activeTab() === 'register'"
          (click)="setTab('register')"
          type="button"
        >
          Sign Up
        </button>
      </div>

      @if (errorMessage()) {
        <p class="error-message">{{ errorMessage() }}</p>
      }

      @if (activeTab() === 'login') {
        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="form">
          <div class="field">
            <label class="field__label">Username or e-mail</label>
            <input
              class="field__input"
              type="text"
              formControlName="identifier"
              placeholder="seu@email.com"
            />
          </div>

          <div class="field">
            <label class="field__label">Password</label>
            <input
              class="field__input"
              type="password"
              formControlName="password"
              placeholder="••••••••"
            />
          </div>

          <button class="btn-primary" type="submit" [disabled]="loading()">
            {{ loading() ? 'entering...' : 'Log In' }}
          </button>

          <p class="form-link">
            Not have account?
            <button type="button" class="link" (click)="setTab('register')">Create Now</button>
          </p>
        </form>
      }

      @if (activeTab() === 'register') {
        <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="form">
          <div class="field">
            <label class="field__label">Username</label>
            <input
              class="field__input"
              type="text"
              formControlName="username"
              placeholder="seunome"
            />
          </div>

          <div class="field">
            <label class="field__label">E-mail</label>
            <input
              class="field__input"
              type="email"
              formControlName="email"
              placeholder="seu@email.com"
            />
          </div>

          <div class="field">
            <label class="field__label">Password</label>
            <input
              class="field__input"
              type="password"
              formControlName="password"
              placeholder="••••••••"
            />
          </div>

          <button class="btn-primary" type="submit" [disabled]="loading()">
            {{ loading() ? 'Creating...' : 'Create Account' }}
          </button>

          <p class="form-link">
            Do you have account?
            <button type="button" class="link" (click)="setTab('login')">Log In</button>
          </p>
        </form>
      }

    </div>
  </div>

</div>
