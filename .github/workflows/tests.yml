name: test core with python

on:
  push: 
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-run:
    runs-on:
      ubuntu-latest
    
    steps:
      - name: Gen random dotenv
        run: |
          echo "JWT_ACCESS_TOKEN_SECRET=$(openssl rand -hex 32)" >> .env
          echo "JWT_REFRESH_TOKEN_SECRET=$(openssl rand -hex 64)" >> .env
          echo "BASE_URL=http://localhost:7171" >> .env
          echo "MAX_ATTEMPTS=50" >> .env
          echo "TIMEOUT=5" >> .env
          echo "ALLOWED_ORIGINS=http://localhost:4200,http://localhost:3000" >> .env

      - name: Config Go
        uses: actions/checkout@v4
        with:
          go-version: "1.26.2"

      - name: Dependency download
        run: go mod tidy
      - name: Run core
        run: go run cmd/api/main.go

      - name: Run python tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"
      
      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Rodar código Python
        run: |
          python main.py