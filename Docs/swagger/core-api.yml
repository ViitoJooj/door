openapi: 3.1.1
info:
  title: Ward Core API
  version: 1.0.0
  description: |
    **EN:** Complete API reference for Ward authentication, applications, logs, and proxy fallback routes.
    Authentication for protected endpoints is cookie-based (`access_token`), issued during login/register and refreshed by `/ward/api/v1/auth/token`.

    **PT-BR:** Referência completa da API do Ward para autenticação, aplicações, logs e rota de fallback de proxy.
    A autenticação dos endpoints protegidos é baseada em cookie (`access_token`), emitido no login/cadastro e renovado por `/ward/api/v1/auth/token`.

servers:
  - url: http://localhost:7171
    description: |
      EN: Local development server.
      PT-BR: Servidor local de desenvolvimento.

tags:
  - name: Auth
    description: |
      EN: User authentication and session management.
      PT-BR: Autenticação de usuário e gerenciamento de sessão.
  - name: Applications
    description: |
      EN: Application (proxy target) management.
      PT-BR: Gerenciamento de aplicações (destinos de proxy).
  - name: Logs
    description: |
      EN: Request log retrieval.
      PT-BR: Consulta de logs de requisição.
  - name: Health
    description: |
      EN: Health check analytics generated from request logs.
      PT-BR: Análises de health check geradas a partir dos logs de requisição.
  - name: Proxy
    description: |
      EN: Catch-all fallback route.
      PT-BR: Rota coringa de fallback.
  - name: Rate Limit
    description: |
      EN: Global rate limit settings.
      PT-BR: Configurações globais de rate limit.
  - name: IP Access
    description: |
      EN: IP whitelist/blacklist management.
      PT-BR: Gerenciamento de whitelist/blacklist de IP.
  - name: Protocol
    description: |
      EN: Allowed protocol mode settings.
      PT-BR: Configuração de protocolo permitido.
  - name: Special Routes
    description: |
      EN: Per-route anti-abuse rules for login/register endpoints.
      PT-BR: Regras antiabuso por rota para endpoints de login/cadastro.

components:
  securitySchemes:
    accessTokenCookie:
      type: apiKey
      in: cookie
      name: access_token
      description: |
        EN: Access token cookie used by protected routes middleware.
        PT-BR: Cookie de token de acesso usado pelo middleware de rotas protegidas.
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: |
        EN: Refresh token cookie used by `/ward/api/v1/auth/token`.
        PT-BR: Cookie de refresh token usado por `/ward/api/v1/auth/token`.

  schemas:
    ErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: internal error.

    UserData:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        role:
          type: string
          enum: [admin, user]
          example: user
        active:
          type: boolean
          example: true
        updated_at:
          type: string
          example: "2026-04-22 15:00:00 +0000 UTC"
        created_at:
          type: string
          example: "2026-04-22 15:00:00 +0000 UTC"

    AdminCreateUserInput:
      type: object
      required: [username, email]
      properties:
        username:
          type: string
          example: new_user
        email:
          type: string
          format: email
          example: new_user@example.com
        role:
          type: string
          enum: [admin, user]
          default: user
        active:
          type: boolean
          default: true

    AdminUpdateUserInput:
      type: object
      required: [username, email, password, role, active]
      properties:
        username:
          type: string
          example: new_user
        email:
          type: string
          format: email
          example: new_user@example.com
        password:
          type: string
          format: password
          example: NewPassword123!
        role:
          type: string
          enum: [admin, user]
          example: user
        active:
          type: boolean
          example: true

    SelfUpdateUserInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: NewPassword123!

    UserOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: user updated.
        data:
          $ref: '#/components/schemas/UserData'

    UserListOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: users fetched.
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserData'

    AdminCreateUserOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: user created.
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/UserData'
            temporary_password:
              type: string
              example: 9gH!s2P@q1Xz

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: myStrongPassword123

    LoginInput:
      type: object
      required: [password]
      properties:
        username:
          type: string
          description: |
            EN: Optional if email is provided.
            PT-BR: Opcional se email for enviado.
          example: john_doe
        email:
          type: string
          format: email
          description: |
            EN: Optional if username is provided.
            PT-BR: Opcional se username for enviado.
          example: john@example.com
        password:
          type: string
          format: password
          example: myStrongPassword123

    RegisterOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: User created.
        data:
          $ref: '#/components/schemas/UserData'

    LoginOutput:
      type: object
      required: [success, message, data, token]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login successful.
        data:
          $ref: '#/components/schemas/UserData'
        token:
          type: string
          description: |
            EN: Present in payload, but currently returned as empty string; authentication uses cookies.
            PT-BR: Presente no payload, mas atualmente retornado como string vazia; a autenticação usa cookies.
          example: ""

    TokenOutput:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true

    LogoutOutput:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Logout successful

    ApplicationInput:
      type: object
      required: [url, country]
      properties:
        url:
          type: string
          example: https://api.example.com
        country:
          type: string
          example: BR

    ApplicationEntity:
      type: object
      properties:
        id:
          type: integer
          example: 12
        url:
          type: string
          example: https://api.example.com
        country:
          type: string
          example: BR
        created_by:
          type: integer
          description: |
            EN: User ID in raw entity responses.
            PT-BR: ID do usuário nas respostas de entidade bruta.
          example: 1
        updated_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"

    ApplicationData:
      type: object
      properties:
        id:
          type: integer
          example: 12
        url:
          type: string
          example: https://api.example.com
        country:
          type: string
          example: BR
        created_by:
          $ref: '#/components/schemas/UserData'
        updated_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"

    ApplicationOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Application has created with successfull.
        data:
          $ref: '#/components/schemas/ApplicationData'

    RequestLogData:
      type: object
      properties:
        id:
          type: integer
          example: 45
        method:
          type: string
          example: GET
        path:
          type: string
          example: /ward/api/v1/applications
        query_string:
          type: string
          example: page=1
        status_code:
          type: integer
          example: 200
        response_time_ms:
          type: integer
          format: int64
          example: 12
        ip:
          type: string
          example: 127.0.0.1
        country:
          type: string
          example: BR
        user_agent:
          type: string
          example: Mozilla/5.0
        referer:
          type: string
          example: http://localhost:4200
        request_size:
          type: integer
          example: 120
        response_size:
          type: integer
          example: 420
        internal:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"

    RequestLogListOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: ok.
        data:
          type: array
          items:
            $ref: '#/components/schemas/RequestLogData'

    HealthOverviewData:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy, unknown]
          example: healthy
        window_minutes:
          type: integer
          example: 15
        generated_at:
          type: string
          format: date-time
          example: "2026-04-28T14:00:00Z"
        total_requests:
          type: integer
          example: 320
        server_errors:
          type: integer
          example: 4
        client_errors:
          type: integer
          example: 18
        availability:
          type: number
          format: double
          example: 98.75
        server_error_rate:
          type: number
          format: double
          example: 1.25
        client_error_rate:
          type: number
          format: double
          example: 5.62
        average_latency_ms:
          type: number
          format: double
          example: 84.2
        p95_latency_ms:
          type: integer
          format: int64
          example: 210
        requests_per_minute:
          type: number
          format: double
          example: 21.33
        unique_ips:
          type: integer
          example: 12
        unique_paths:
          type: integer
          example: 9

    HealthOverviewOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: ok.
        data:
          $ref: '#/components/schemas/HealthOverviewData'

    HealthRouteData:
      type: object
      properties:
        method:
          type: string
          example: GET
        path:
          type: string
          example: /ward/api/v1/logs
        status:
          type: string
          enum: [healthy, degraded, unhealthy, unknown]
          example: degraded
        window_minutes:
          type: integer
          example: 15
        last_seen_at:
          type: string
          format: date-time
          example: "2026-04-28T14:00:00Z"
        request_count:
          type: integer
          example: 120
        server_errors:
          type: integer
          example: 5
        client_errors:
          type: integer
          example: 11
        availability:
          type: number
          format: double
          example: 95.83
        server_error_rate:
          type: number
          format: double
          example: 4.17
        client_error_rate:
          type: number
          format: double
          example: 9.17
        average_latency_ms:
          type: number
          format: double
          example: 175.1
        p95_latency_ms:
          type: integer
          format: int64
          example: 390
        requests_per_minute:
          type: number
          format: double
          example: 8.0

    HealthRoutesOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: ok.
        data:
          type: array
          items:
            $ref: '#/components/schemas/HealthRouteData'

    RateLimitInput:
      type: object
      required: [requests_per_second, burst, progressive_rate_limit]
      properties:
        requests_per_second:
          type: number
          format: double
          example: 10
        burst:
          type: integer
          example: 20
        progressive_rate_limit:
          type: boolean
          example: true

    RateLimitData:
      type: object
      properties:
        id:
          type: integer
          example: 1
        requests_per_second:
          type: number
          format: double
          example: 10
        burst:
          type: integer
          example: 20
        progressive_rate_limit:
          type: boolean
          example: true
        updated_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"

    RateLimitOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: ok.
        data:
          $ref: '#/components/schemas/RateLimitData'

    IPAccessInput:
      type: object
      required: [ip]
      properties:
        ip:
          type: string
          example: 203.0.113.10

    IPAccessData:
      type: object
      properties:
        id:
          type: integer
          example: 1
        ip:
          type: string
          example: 203.0.113.10
        created_by:
          type: integer
          example: 1
        updated_by:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"

    IPAccessOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: whitelist ip created.
        data:
          $ref: '#/components/schemas/IPAccessData'

    IPAccessListOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: ok.
        data:
          type: array
          items:
            $ref: '#/components/schemas/IPAccessData'

    ProtocolSettingsInput:
      type: object
      required: [allowed_protocol, apply_scope]
      properties:
        allowed_protocol:
          type: string
          enum: [http, https, both]
          example: both
        apply_scope:
          type: string
          enum: [all, external]
          example: external

    ProtocolSettingsData:
      type: object
      properties:
        id:
          type: integer
          example: 1
        allowed_protocol:
          type: string
          enum: [http, https, both]
          example: both
        apply_scope:
          type: string
          enum: [all, external]
          example: all
        updated_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"

    ProtocolSettingsOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: protocol mode updated.
        data:
          $ref: '#/components/schemas/ProtocolSettingsData'

    SpecialRouteInput:
      type: object
      required: [path, max_distinct_requests, window_seconds, ban_seconds, enabled]
      properties:
        path:
          type: string
          example: /ward/api/v1/auth/login
        max_distinct_requests:
          type: integer
          example: 10
        window_seconds:
          type: integer
          example: 60
        ban_seconds:
          type: integer
          example: 300
        enabled:
          type: boolean
          example: true

    SpecialRouteData:
      type: object
      properties:
        id:
          type: integer
          example: 1
        route_type:
          type: string
          enum: [login, register]
          example: login
        path:
          type: string
          example: /ward/api/v1/auth/login
        max_distinct_requests:
          type: integer
          example: 10
        window_seconds:
          type: integer
          example: 60
        ban_seconds:
          type: integer
          example: 300
        enabled:
          type: boolean
          example: true
        created_by:
          type: integer
          example: 1
        updated_by:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-22T15:00:00Z"

    SpecialRouteOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: special route created.
        data:
          $ref: '#/components/schemas/SpecialRouteData'

    SpecialRouteListOutput:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: ok.
        data:
          type: array
          items:
            $ref: '#/components/schemas/SpecialRouteData'

paths:
  /ward/api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register user / Registrar usuário
      description: |
        **EN:** Bootstrap registration endpoint. It creates the very first user as `admin` and sets `access_token` and `refresh_token` cookies.
        After the first user exists, this route returns `403` and new users must be created by admins via `/ward/api/v1/users`.
        Returns profile data in a success envelope.

        **PT-BR:** Endpoint de cadastro inicial (bootstrap). Cria o primeiro usuário como `admin` e define os cookies `access_token` e `refresh_token`.
        Depois que existir um usuário, esta rota passa a retornar `403` e novos usuários devem ser criados por admins em `/ward/api/v1/users`.
        Retorna dados de perfil em um envelope de sucesso.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: |
            EN: User created.
            PT-BR: Usuário criado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterOutput'
        '400':
          description: |
            EN: Invalid JSON or internal error surfaced as bad request.
            PT-BR: JSON inválido ou erro interno retornado como bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            EN: Registration disabled after bootstrap.
            PT-BR: Cadastro desabilitado após o bootstrap.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ward/api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login / Entrar
      description: |
        **EN:** Authenticates by username+password or email+password, then sets `access_token` and `refresh_token` cookies.
        Returns authenticated user data.

        **PT-BR:** Autentica por username+password ou email+password, e define os cookies `access_token` e `refresh_token`.
        Retorna os dados do usuário autenticado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: |
            EN: Login successful.
            PT-BR: Login realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginOutput'
        '400':
          description: |
            EN: Invalid JSON or invalid credentials mapped to bad request.
            PT-BR: JSON inválido ou credenciais inválidas mapeadas para bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ward/api/v1/auth/token:
    get:
      tags: [Auth]
      summary: Refresh access token / Renovar token de acesso
      description: |
        **EN:** Uses the `refresh_token` cookie to validate the session and issue a new `access_token` cookie.
        This endpoint does not require `access_token`.

        **PT-BR:** Usa o cookie `refresh_token` para validar a sessão e emitir um novo cookie `access_token`.
        Este endpoint não exige `access_token`.
      security:
        - refreshTokenCookie: []
      responses:
        '200':
          description: |
            EN: Access token refreshed successfully.
            PT-BR: Token de acesso renovado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenOutput'
        '401':
          description: |
            EN: Missing or invalid refresh token.
            PT-BR: Refresh token ausente ou inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: |
            EN: Internal token generation error.
            PT-BR: Erro interno ao gerar token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ward/api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout / Sair
      description: |
        **EN:** Clears authentication cookies and ends the current session.
        **PT-BR:** Limpa os cookies de autenticação e encerra a sessão atual.
      responses:
        '200':
          description: |
            EN: Logout successful.
            PT-BR: Logout realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutOutput'

  /ward/api/v1/applications:
    get:
      tags: [Applications]
      summary: List applications / Listar aplicações
      description: |
        **EN:** Returns all applications as raw entities (array), not wrapped in `success/message/data`.
        Requires `access_token` cookie.

        **PT-BR:** Retorna todas as aplicações como entidades brutas (array), sem envelope `success/message/data`.
        Requer cookie `access_token`.
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: |
            EN: Applications list.
            PT-BR: Lista de aplicações.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationEntity'
        '401':
          description: |
            EN: Missing/invalid access token.
            PT-BR: Token de acesso ausente/inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: |
            EN: Internal error.
            PT-BR: Erro interno.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Applications]
      summary: Create application / Criar aplicação
      description: |
        **EN:** Creates a new application linked to the authenticated user.
        Requires `access_token` cookie.

        **PT-BR:** Cria uma nova aplicação vinculada ao usuário autenticado.
        Requer cookie `access_token`.
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationInput'
      responses:
        '201':
          description: |
            EN: Application created.
            PT-BR: Aplicação criada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationOutput'
        '401':
          description: |
            EN: Missing/invalid access token.
            PT-BR: Token de acesso ausente/inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: |
            EN: Internal error.
            PT-BR: Erro interno.
          content:
