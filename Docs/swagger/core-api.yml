  /{path}:
    x-internal: true
    parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
        description: |
          EN: Catch-all unmatched path.
          PT-BR: Caminho coringa para rotas não casadas.
    get:
      tags: [Proxy]
      summary: Proxy fallback (GET) / Fallback de proxy (GET)
      description: |
        **EN:** Forwards unmatched requests to the selected upstream application.
        If request input (body/query) contains SQL commands, returns `400` with `invalid data.`.
        If upstream response body contains SQL commands, returns `500` with `internal error`.
        Otherwise returns upstream status/body.

        **PT-BR:** Encaminha requisições não casadas para a aplicação upstream selecionada.
        Se o input (body/query) contiver comandos SQL, retorna `400` com `invalid data.`.
        Se o body da resposta upstream contiver comandos SQL, retorna `500` com `internal error`.
        Caso contrário retorna status/body do upstream.
      responses:
        '400':
          description: SQL command detected in input / Comando SQL detectado no input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: SQL command detected in upstream output / Comando SQL detectado no retorno upstream
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Upstream response passthrough / Resposta upstream repassada
    post:
      tags: [Proxy]
      summary: Proxy fallback (POST) / Fallback de proxy (POST)
      description: |
        **EN:** Same behavior as GET fallback.
        **PT-BR:** Mesmo comportamento do fallback GET.
      responses:
        '400':
          description: SQL command detected in input / Comando SQL detectado no input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: SQL command detected in upstream output / Comando SQL detectado no retorno upstream
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Upstream response passthrough / Resposta upstream repassada
    put:
      tags: [Proxy]
      summary: Proxy fallback (PUT) / Fallback de proxy (PUT)
      description: |
        **EN:** Same behavior as GET fallback.
        **PT-BR:** Mesmo comportamento do fallback GET.
      responses:
        '400':
          description: SQL command detected in input / Comando SQL detectado no input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: SQL command detected in upstream output / Comando SQL detectado no retorno upstream
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Upstream response passthrough / Resposta upstream repassada
    patch:
      tags: [Proxy]
      summary: Proxy fallback (PATCH) / Fallback de proxy (PATCH)
      description: |
        **EN:** Same behavior as GET fallback.
        **PT-BR:** Mesmo comportamento do fallback GET.
      responses:
        '400':
          description: SQL command detected in input / Comando SQL detectado no input
          content:
            application/json:
              schema:
